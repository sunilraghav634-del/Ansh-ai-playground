<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansh AI Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 250px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <div class="max-w-4xl mx-auto p-4">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-400">Ansh AI Playground</h1>
            <p class="text-gray-400 text-sm">Testing multi-model integration via OpenRouter</p>
        </header>

        <div class="bg-gray-800 p-4 rounded-lg shadow-lg mb-4 flex flex-wrap gap-4">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-semibold mb-1 uppercase text-gray-500">API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your OpenRouter Key" 
                    class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-sm focus:outline-none focus:border-blue-500">
                <button onclick="useGuestKey()" class="text-[10px] text-blue-400 mt-1 hover:underline">Use Guest Key</button>
            </div>
            
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-semibold mb-1 uppercase text-gray-500">Select Model</label>
                <select id="modelSelect" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-sm focus:outline-none focus:border-blue-500">
                    <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
                    <option value="deepseek/deepseek-r1:free">DeepSeek R1 (Free)</option>
                    <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
                    <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Free)</option>
                </select>
            </div>
        </div>

        <div id="chatBox" class="chat-container bg-gray-800 rounded-lg p-4 overflow-y-auto mb-4 border border-gray-700">
            <div class="text-center text-gray-500 mt-10">Select a model and start a conversation.</div>
        </div>

        <div class="flex gap-2">
            <textarea id="userInput" rows="1" placeholder="Type your message..." 
                class="flex-1 bg-gray-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500 resize-none"></textarea>
            <button onclick="sendMessage()" id="sendBtn" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-bold transition">Send</button>
        </div>
    </div>

    <script>
        const GUEST_KEY = "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";

        function useGuestKey() {
            document.getElementById('apiKey').value = GUEST_KEY;
        }

        async function sendMessage() {
            const apiKey = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            const userInput = document.getElementById('userInput').value;
            const chatBox = document.getElementById('chatBox');
            const sendBtn = document.getElementById('sendBtn');

            if (!apiKey) return alert("Please enter an API Key or use Guest Mode!");
            if (!userInput.trim()) return;

            // Append User Message
            appendMessage('user', userInput);
            document.getElementById('userInput').value = '';
            
            // Loading State
            sendBtn.disabled = true;
            sendBtn.innerText = "Wait...";
            const aiMsgDiv = appendMessage('ai', 'Thinking...');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": model,
                        "messages": [{ "role": "user", "content": userInput }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                aiMsgDiv.innerText = aiResponse;

            } catch (error) {
                aiMsgDiv.innerText = "Error: " + error.message;
                aiMsgDiv.classList.add('text-red-400');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "Send";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `mb-4 p-3 rounded-lg ${role === 'user' ? 'bg-blue-900/30 ml-auto max-w-[80%]' : 'bg-gray-700 mr-auto max-w-[80%]'}`;
            msgDiv.innerHTML = `<span class="block text-[10px] uppercase font-bold text-gray-400 mb-1">${role}</span>
                               <div class="whitespace-pre-wrap">${text}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv.querySelector('div');
        }
    </script>
</body>
    </html>
