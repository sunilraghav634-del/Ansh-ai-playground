<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansh AI Playground - Smart Memory</title>

    <!-- ✅ PWA Tags (3 lines added) -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .chat-container { height: calc(100vh - 320px); min-height: 400px; }
        .glass-effect { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="max-w-5xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-black bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent italic">ANSH AI</h1>
                <p class="text-slate-500 text-sm font-medium uppercase tracking-widest">Smart Playground v1.2</p>
            </div>
            <div class="hidden sm:block text-right">
                <span id="status" class="px-3 py-1 bg-green-500/10 text-green-400 text-xs rounded-full border border-green-500/20">Memory Active</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass-effect p-5 rounded-2xl shadow-xl">
                    <h2 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-tighter">Configuration</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold mb-2 text-slate-300">OpenRouter API Key</label>
                            <input type="password" id="apiKey" placeholder="sk-or-v1-..." 
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-blue-300">
                            <button onclick="useGuestKey()" class="w-full mt-2 py-2 bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 text-xs font-bold rounded-lg border border-blue-500/30 transition">
                                USE GUEST KEY
                            </button>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-2 text-slate-300">Model</label>
                            <select id="modelSelect" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 appearance-none cursor-pointer">
                                <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
                                <option value="deepseek/deepseek-r1">DeepSeek R1</option>
                                <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B</option>
                                <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
                            </select>
                        </div>
                        <button onclick="clearChat()" class="w-full py-2 text-slate-500 hover:text-red-400 text-xs font-medium transition italic border border-slate-700 rounded-lg">
                            Reset Session (Clear Memory)
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col space-y-4">
                <div id="chatBox" class="chat-container glass-effect rounded-2xl p-6 overflow-y-auto shadow-2xl flex flex-col gap-4 border-slate-700/50">
                    <div class="m-auto text-center opacity-40" id="welcomeMsg">
                        <div class="text-5xl mb-4">🧠</div>
                        <p class="text-sm italic">AI now remembers your previous messages.</p>
                    </div>
                </div>

                <div class="relative group">
                    <textarea id="userInput" rows="2" placeholder="Ask something..." 
                        class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl p-4 pr-16 focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/5 transition-all resize-none shadow-lg"
                        onkeydown="if(event.keyCode===13 && !event.shiftKey){event.preventDefault(); sendMessage();}"></textarea>
                    <button onclick="sendMessage()" id="sendBtn" 
                        class="absolute right-3 bottom-3 bg-blue-600 hover:bg-blue-500 p-3 rounded-xl shadow-lg transition-transform active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-current" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ✅ PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        const GUEST_KEY = "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";
        
        let chatHistory = [];

        function useGuestKey() {
            document.getElementById('apiKey').value = GUEST_KEY;
        }

        function clearChat() {
            chatHistory = [];
            document.getElementById('chatBox').innerHTML = `<div class="m-auto text-center opacity-40"><div class="text-5xl mb-4">🧠</div><p class="text-sm italic">Memory Cleared. New session started.</p></div>`;
        }

        async function sendMessage() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            const userInput = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const sendBtn = document.getElementById('sendBtn');

            const prompt = userInput.value.trim();
            if (!apiKey || !prompt) return;

            if(document.getElementById('welcomeMsg')) document.getElementById('welcomeMsg').remove();

            appendMessage('user', prompt);
            chatHistory.push({ "role": "user", "content": prompt });
            userInput.value = '';
            
            sendBtn.disabled = true;
            const aiMsgDiv = appendMessage('ai', '<span class="animate-pulse">Thinking...</span>');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin,
                        "X-Title": "Ansh AI Smart Playground"
                    },
                    body: JSON.stringify({
                        "model": model,
                        "messages": chatHistory
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices[0]) {
                    const aiContent = data.choices[0].message.content;
                    aiMsgDiv.innerText = aiContent;
                    chatHistory.push({ "role": "assistant", "content": aiContent });
                } else {
                    aiMsgDiv.innerHTML = `<span class="text-red-400">Error: ${data.error ? data.error.message : "Invalid Response"}</span>`;
                }

            } catch (err) {
                aiMsgDiv.innerText = "Network Error: " + err.message;
            } finally {
                sendBtn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
                if(chatHistory.length > 10) {
                    chatHistory = chatHistory.slice(-10);
                }
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const msgDiv = document.createElement('div');
            msgDiv.className = `max-w-[85%] p-4 rounded-2xl text-sm ${role === 'user' ? 'bg-blue-600 shadow-blue-500/20' : 'bg-slate-800 border border-slate-700 shadow-black/20'}`;
            msgDiv.innerHTML = text;
            wrapper.appendChild(msgDiv);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }
    </script>
</body>
</html>
