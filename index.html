<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Soul - AI Playground</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header & Analytics Flex */
        header {
            padding: 15px;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #e94560;
        }

        h1 { margin: 0; color: #e94560; font-size: 1.5rem; }
        .stats { font-size: 0.8rem; color: #aaa; margin-top: 5px; }

        /* Setup Area (Key Input) */
        #setup-container {
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
        }

        input {
            padding: 12px;
            width: 70%;
            max-width: 300px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #0f3460;
            color: white;
            outline: none;
        }

        button {
            padding: 12px 20px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            background: #e94560;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #ff2e63; transform: scale(1.05); }
        .guest-btn { background: #00d2d3; }

        /* Chat Area */
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px;
            border-radius: 15px;
            line-height: 1.4;
        }

        .user { align-self: flex-end; background: #e94560; color: white; }
        .ai { align-self: flex-start; background: #0f3460; border: 1px solid #e94560; }

        /* Input Bar (Shifted UP to avoid Google Warning) */
        #input-container {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            gap: 10px;
            margin-bottom: 60px; /* Isse layout warning ke upar rahega */
        }
    </style>
</head>
<body>

<header>
    <h1>ANIME SOUL</h1>
    <div class="stats">1.3 Lakh+ Views • Powered by Ansh System</div>
</header>

<div id="setup-container">
    <input type="password" id="apiKey" placeholder="Enter API Key or Use Guest Access">
    <br>
    <button onclick="startChat()">Start Chat</button>
    <button class="guest-btn" onclick="activateGuest()">Unlock Guest Access 🔑</button>
</div>

<div id="chat-box">
    <div class="message ai">Hello! Main Gojo Satoru hoon. Baat karni hai? Pehle Guest Access unlock karo ya apni API key daalo!</div>
</div>

<div id="input-container">
    <input type="text" id="userInput" placeholder="Ask anything to Gojo..." style="flex: 1;">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    // --- CONFIGURATION ---
    const MY_TEST_KEY = "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"; // <--- APNI KEY YAHAN DAALO
    let activeKey = "";

    function activateGuest() {
        document.getElementById('apiKey').value = "********";
        activeKey = MY_TEST_KEY;
        alert("Ansh's Special Master Key Activated! 😎");
        document.getElementById('setup-container').style.display = 'none';
    }

    function startChat() {
        activeKey = document.getElementById('apiKey').value;
        if(activeKey) {
            document.getElementById('setup-container').style.display = 'none';
        } else {
            alert("Bhai, key toh daalo!");
        }
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        const text = input.value;
        if(!text || !activeKey) return;

        // User Message UI
        chatBox.innerHTML += `<div class="message user">${text}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${activeKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "You are Gojo Satoru from Jujutsu Kaisen. Talk in Hindi and English mix. Answer this: " + text }] }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;

            // AI Message UI
            chatBox.innerHTML += `<div class="message ai">${aiText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            chatBox.innerHTML += `<div class="message ai" style="color:red">Error: Server Busy! (Check API Key)</div>`;
        }
    }
</script>

</body>
    </html>
