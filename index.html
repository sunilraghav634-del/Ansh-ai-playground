<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Playground - by Ansh</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #1e293b; text-align: center; border-bottom: 2px solid #3b82f6; }
        #setup { padding: 20px; text-align: center; background: #1e293b; }
        input { padding: 10px; border-radius: 5px; border: none; width: 60%; }
        button { padding: 10px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-main { background: #3b82f6; color: white; }
        .btn-guest { background: #10b981; color: white; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user { align-self: flex-end; background: #3b82f6; }
        .ai { align-self: flex-start; background: #334155; border: 1px solid #475569; }
        /* Layout Fix to avoid Google Warning Strip */
        #input-area { padding: 20px; background: #1e293b; display: flex; gap: 10px; margin-bottom: 70px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0">🚀 AI Playground</h2>
    <div style="font-size: 12px; color: #94a3b8;">1.3 Lakh+ Views • Master Edition</div>
</header>

<div id="setup">
    <input type="password" id="keyInput" placeholder="Enter Gemini API Key...">
    <br>
    <button class="btn-main" onclick="startApp()">Start AI</button>
    <button class="btn-guest" onclick="activateGuest()">Unlock Guest Access 🔑</button>
</div>

<div id="chat">
    <div class="msg ai">Welcome to the Playground! Guest Access unlock karo ya apni key daalo start karne ke liye.</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Ask AI anything..." style="flex:1">
    <button class="btn-main" onclick="askAI()">Send</button>
</div>

<script>
    // --- API CONFIG ---
    let API_KEY = "";
    const TEST_KEY = "PASTE_YOUR_API_KEY_HERE"; // <--- APNI KEY YAHAN DAALO

    function activateGuest() {
        API_KEY = TEST_KEY;
        document.getElementById('keyInput').value = "********";
        document.getElementById('setup').style.backgroundColor = "#064e3b";
        alert("Special Guest Access Granted! 😎");
    }

    function startApp() {
        const val = document.getElementById('keyInput').value;
        if(val !== "********") API_KEY = val;
        if(API_KEY) {
            alert("System Ready! Let's Go.");
        } else {
            alert("Bhai, Key toh daalo!");
        }
    }

    async function askAI() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const text = input.value;
        if(!text || !API_KEY) return;

        chat.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        chat.scrollTop = chat.scrollHeight;

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            
            // Fix: Agar error aaye toh message dikhao
            if(data.error) {
                chat.innerHTML += `<div class="msg ai" style="color:#f87171">Error: ${data.error.message}</div>`;
            } else {
                const aiMsg = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ai">${aiMsg}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        } catch (e) {
            chat.innerHTML += `<div class="msg ai" style="color:#f87171">Server Busy! Check Net or Key.</div>`;
        }
    }
</script>
</body>
        </html>
