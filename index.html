<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansh AI - Dual Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .chat-container { height: calc(100vh - 380px); min-height: 350px; }
        .mode-active { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .image-result { border-radius: 15px; border: 2px solid #334155; width: 100%; max-width: 400px; margin-top: 10px; transition: transform 0.3s; }
        .image-result:hover { transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500">ANSH AI <span class="text-white">PRO</span></h1>
            <p class="text-slate-500 text-xs mt-1 uppercase tracking-widest">Advanced PWA Playground</p>
        </header>

        <div class="flex justify-center gap-2 mb-6">
            <button id="chatModeBtn" onclick="setMode('chat')" class="mode-active px-6 py-2 rounded-full font-bold text-sm transition-all border border-slate-700">💬 CHAT MODE</button>
            <button id="imageModeBtn" onclick="setMode('image')" class="bg-slate-800 px-6 py-2 rounded-full font-bold text-sm transition-all border border-slate-700">🎨 IMAGE MODE</button>
        </div>

        <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 mb-6 flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[10px] font-bold text-slate-500 mb-1">OPENROUTER KEY</label>
                <input type="password" id="apiKey" placeholder="sk-or-v1-..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-blue-400 focus:outline-none">
            </div>
            <button onclick="useGuestKey()" class="bg-blue-600/10 text-blue-400 px-4 py-2 rounded-lg text-xs font-bold border border-blue-600/30 hover:bg-blue-600/20 transition">GUEST</button>
        </div>

        <div id="chatBox" class="chat-container bg-slate-900/50 rounded-3xl p-6 overflow-y-auto mb-6 border border-slate-800 flex flex-col gap-4">
            <div class="m-auto text-center opacity-20" id="emptyState">
                <p id="modeHint">Ready for Chat. Ask anything!</p>
            </div>
        </div>

        <div class="relative">
            <textarea id="userInput" rows="1" placeholder="Type your prompt..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 pr-24 focus:outline-none focus:border-blue-500 transition-all resize-none shadow-2xl"></textarea>
            <div class="absolute right-2 bottom-2 flex gap-2">
                <button id="micBtn" class="bg-slate-700 p-3 rounded-xl hover:bg-red-500 transition active:scale-90">🎙️</button>
                <button onclick="sendMessage()" id="sendBtn" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-500 transition shadow-lg shadow-blue-500/20">🚀</button>
            </div>
        </div>
    </div>

    <script>
        const GUEST_KEY = "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";
        let currentMode = 'chat'; // default
        let chatHistory = [];

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('chatModeBtn').className = mode === 'chat' ? 'mode-active px-6 py-2 rounded-full font-bold text-sm transition-all border border-slate-700' : 'bg-slate-800 px-6 py-2 rounded-full font-bold text-sm transition-all border border-slate-700 text-slate-400';
            document.getElementById('imageModeBtn').className = mode === 'image' ? 'mode-active px-6 py-2 rounded-full font-bold text-sm transition-all border border-slate-700' : 'bg-slate-800 px-6 py-2 rounded-full font-bold text-sm transition-all border border-slate-700 text-slate-400';
            document.getElementById('modeHint').innerText = mode === 'chat' ? 'Ready for Chat. Ask anything!' : 'Describe the image you want to create!';
            document.getElementById('userInput').placeholder = mode === 'chat' ? 'Ask Ansh AI...' : 'A futuristic city at night...';
        }

        function useGuestKey() { document.getElementById('apiKey').value = GUEST_KEY; }

        // Speech
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        document.getElementById('micBtn').onclick = () => { recognition.start(); document.getElementById('micBtn').classList.add('bg-red-600'); };
        recognition.onresult = (e) => { 
            document.getElementById('userInput').value = e.results[0][0].transcript; 
            document.getElementById('micBtn').classList.remove('bg-red-600');
            sendMessage();
        };

        async function sendMessage() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const userInput = document.getElementById('userInput');
            const prompt = userInput.value.trim();
            if (!apiKey || !prompt) return;

            if(document.getElementById('emptyState')) document.getElementById('emptyState').remove();
            appendMessage('user', prompt);
            userInput.value = '';

            const aiMsgDiv = appendMessage('ai', `<span class="animate-pulse">${currentMode === 'chat' ? 'Thinking...' : 'Painting...'}</span>`);
            
            // Mode based Model Selection
            const model = currentMode === 'chat' ? "google/gemini-2.0-flash-001" : "black-forest-labs/flux-schnell";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ "model": model, "messages": [{ "role": "user", "content": prompt }] })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const result = data.choices[0].message.content;
                    
                    if (currentMode === 'image') {
                        // Image Display
                        aiMsgDiv.innerHTML = `<p class="mb-2 text-xs text-blue-400">Generated with Flux:</p><img src="${result}" class="image-result" onerror="this.src='https://via.placeholder.com/400?text=Image+Generation+Failed'">`;
                    } else {
                        // Chat Display + Voice
                        aiMsgDiv.innerText = result;
                        const utt = new SpeechSynthesisUtterance(result);
                        speechSynthesis.speak(utt);
                    }
                } else {
                    aiMsgDiv.innerText = "Error: " + (data.error ? data.error.message : "Something went wrong.");
                }
            } catch (err) {
                aiMsgDiv.innerText = "Network Error. Check console.";
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const msg = document.createElement('div');
            msg.className = `max-w-[85%] p-4 rounded-2xl text-sm ${role === 'user' ? 'bg-blue-600' : 'bg-slate-800 border border-slate-700'}`;
            msg.innerHTML = text;
            wrap.appendChild(msg);
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msg;
        }
    </script>
</body>
                </html>
